---
# Pi Coding Agent Offline Role - Self-contained
# Installs pi-coding-agent + extensions from pre-built tarballs
# No internet required on the target machine

pi_offline_user: "{{ target_user | default(ansible_facts['user_id']) }}"
pi_offline_home: "/home/{{ pi_offline_user }}"

# =============================================================================
# Source Tarballs (from dotfiles repo)
# =============================================================================
pi_offline_dotfiles_dest: "{{ pi_offline_home }}/src/omarchy-dotfiles"
pi_offline_bundle_dir: "{{ pi_offline_dotfiles_dest }}/pi-coding-agent-offline"

# npm global prefix tarball (contains bin/pi + lib/node_modules/*)
pi_offline_npm_tarball: "{{ pi_offline_bundle_dir }}/pi-npm-global.tar.gz"

# pi agent data tarball (contains .pi/agent/npm/* + .pi/agent/settings.json)
pi_offline_agent_tarball: "{{ pi_offline_bundle_dir }}/pi-agent-data.tar.gz"

# =============================================================================
# Installation Paths
# =============================================================================
pi_offline_npm_prefix: "{{ pi_offline_home }}/.npm-global"
pi_offline_pi_agent_dir: "{{ pi_offline_home }}/.pi"

# =============================================================================
# Node.js Dependency
# =============================================================================
# Node.js must be installed via pacman (available offline via pacman cache
# or pre-installed by Omarchy)
pi_offline_pacman_packages:
  - nodejs
  - npm
